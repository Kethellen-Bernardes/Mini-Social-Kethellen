<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/profile.png" class="avatar">
      <div>
        <span class="name">Moranketh</span>
        <span class="username">@kethão</span>
      </div>
    </div>

    <p class="post-text">
      A isa é a minha woman
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>EU TE AMOO - Isa </p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>"Whatever makes you feel better
Paint me as the villain if that makes you feel better
Make everyone hate me if that makes you feel better
Hmm, whatever makes you feel better"</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>

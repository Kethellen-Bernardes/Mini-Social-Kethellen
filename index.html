<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/profile.png" class="avatar">
      <div>
        <span class="name">Moranketh</span>
        <span class="username">@kethão</span>
      </div>
    </div>

    <p class="post-text">
Tell me what's on your mind, 
For you, I'd die a thousand times,
Find you in every life, 
For you, I'd dive into your tears and swim the deepest sea 
-para a isa S2 
    </p>

    <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
    </div>

    <div class="post-actions">
<button id="likeBtn">Deslike</button>
<span id="likeCount">0</span>
    </div>

    <section class="comments">
      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>EU TE AMOO - Isa </p>
      </div>

      <div class="comment">
        <img src="assets/avatar.png" class="avatar-small">
        <p>Vc parece um ursinho! -Isa</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
